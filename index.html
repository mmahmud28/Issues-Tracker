<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="./style.css">

    <title>Login || Issues Tracker</title>
</head>

<body class="font w-1/3 mx-auto my-[80px]">

    <div class="card bg-base-100 shadow-xl h-full w-full p-8 space-y-5">

        <section class="space-y-4 flex flex-col text-center items-center">
            <img class="w-[100px] h-[100px]" src="./assets/github-logo.png" alt="">
            <div>
                <h1 class="text-2xl font-bold text-[#1F2937]">Github Issues Tracker</h1>
                <p class="text-[#64748B]">Sign in to manage your issues</p>
            </div>
        </section>

        <section class="space-y-2">
            <div class="space-y-2">
                <fieldset class="fieldset space-y-1">
                    <legend class="font-semibold text-[16px] fieldset-legend">Username</legend>
                    <input id="input-user-name" value="admin" type="text" class="input w-full" placeholder="Enter Username" />
                    <p class="label text-purple-600">Default: admin</p>
                </fieldset>
            </div>

            <div class="space-y-2">
                <fieldset class="fieldset space-y-1">
                    <legend class="font-semibold text-[16px] fieldset-legend">Password</legend>
                    <input id="input-password" value="admin123" type="password" class="input w-full" placeholder="Enter Password" />
                    <p class="label text-purple-600">Default: admin123</p>
                </fieldset>
            </div>

        </section>

        <button onclick="logInFunction()" id="signInButton" class="btn btn-primary">Sign In</button>

        <div class="flex w-full flex-col">
            <div class="divider">OR</div>           
        </div>

        <section class="space-y-2">
             <p class="text-[#64748B] mx-auto text-center">Demo Credentials:</p>
             <div class="py-6 bg-gray-200 rounded-md text-center">
                <p class="font-semibold text-[16px]">Username: <span class="font-normal">admin</span></p>
                <p class="font-semibold text-[16px]">Password: <span class="font-normal">admin123</span></p>
             </div>
        </section>

    </div>
    <script src="./sigin.js"></script>
</body>

</html>
